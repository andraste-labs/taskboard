version: "3.9"

# Single compose file covering both DEV and PROD workflows via profiles.
# Dev:  docker compose --profile dev up --build
# Prod: docker compose --profile prod up --build -d

services:
  taskboard-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: taskboard:dev
    container_name: taskboard-dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3

  taskboard-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.taskboard.example.com}
    image: taskboard:latest
    container_name: taskboard-prod
    profiles: ["prod"]
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    restart: unless-stopped
