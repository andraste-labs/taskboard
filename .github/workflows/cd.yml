name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway (Production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://taskboard.up.railway.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploying (safety gate)
        run: npm run test -- --run

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        run: railway up --service taskboard --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify deployment health (zero-downtime gate)
        run: |
          URL="${{ vars.PRODUCTION_URL || 'https://taskboard.up.railway.app' }}/health"
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Deployment healthy at attempt $i"
              exit 0
            fi
            echo "Waiting for deployment to become healthy... attempt $i/10"
            sleep 10
          done
          echo "Deployment health check failed after 10 attempts"
          exit 1

  rollback:
    name: Automatic Rollback on Failure
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Rollback to last known-good deployment
        run: railway rollback --service taskboard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Notify rollback
        run: echo "Deployment failed health check - rolled back service 'taskboard' to previous version."
