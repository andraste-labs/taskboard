server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Health check endpoint for container orchestration / Railway
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # SPA routing fallback (React Router / client-side routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-term caching for hashed static assets
    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache the SPA shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:;" always;

    client_max_body_size 1M;
}
